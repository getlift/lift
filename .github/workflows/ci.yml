name: CI

on:
    push:
        branches: [master]
    pull_request:

jobs:
    unit-tests:
        name: Unit tests
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node:
                    - 20
                    - 22
                    - 24
                serverless:
                    - package: "osls@>=3.54.1 <3.65.0"
                      module: osls
                    - package: "serverless@3"
                      module: serverless
                    # - "4" Official way to test plugins for serverless is missing.
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
            - uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ matrix.node }}-${{ hashFiles('**/package.json') }}
            - run: npm i
            - run: npm i "${{ matrix.serverless.package }}"
            - name: Run jest unit tests
              env:
                  NODE_OPTIONS: "--max_old_space_size=4096"
                  SERVERLESS_TEST_PACKAGE: ${{ matrix.serverless.module }}
              run: npm test
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
            - run: npm i
            - run: npm run check-format
            - run: npm run lint
    type:
        name: Type
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
            - run: npm i
            - name: Typescript checks
              run: npx tsc --noEmit
