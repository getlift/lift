service: storage
configValidationMode: error

provider:
    name: aws

constructs:
    default:
        type: storage
    kmsEncryption:
        type: storage
        encryption: kms
    extendedBucket:
        type: storage
        extensions:
            bucket:
                Properties:
                    ObjectLockEnabled: True
    extendedBucketWithArray:
        type: storage
        extensions:
            bucket:
                Properties:
                    CorsConfiguration:
                        CorsRules:
                            - AllowedOrigins:
                                  - "*"
                              AllowedHeaders:
                                  - "*"
                              AllowedMethods:
                                  - GET
                                  - HEAD
                                  - PUT
                                  - POST
    withAcl:
        type: storage
        allowAcl: true
    withPublicPath:
        type: storage
        publicPath: public
    withPublicPathAndAcl:
        type: storage
        publicPath: /public/
        allowAcl: true
    withPublicPathSlash:
        type: storage
        publicPath: /
    withPublicPathStar:
        type: storage
        publicPath: "*"
    withCorsString:
        type: storage
        cors: "*"
    withCorsRules:
        type: storage
        cors:
            - allowedOrigins:
                  - "https://example.com"
              allowedMethods:
                  - PUT
              allowedHeaders:
                  - "*"
    withLifecycleRules:
        type: storage
        lifecycleRules:
            - prefix: tmp/
              expirationInDays: 1
            - Prefix: cache/
              ExpirationInDays: 7
              Status: Disabled
